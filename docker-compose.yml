services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/sleads_dev
      JWT_SECRET: replace_with_a_strong_random_string_min_16_chars
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  mongo-data:
